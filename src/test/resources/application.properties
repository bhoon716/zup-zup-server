spring.application.name=sugang-helper-test

# Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# JWT
jwt.secret=dummy-jwt-secret-key-must-be-very-long-and-secure-enough-for-hs512
jwt.access.expiration=1800000
jwt.refresh.expiration=1209600000

# CORS
app.cors.allowed-origins=http://localhost:3000

# OAuth2 Redirect
app.oauth2.authorized-redirect-uri=http://localhost:3000/oauth2/redirect

# Email (SMTP) - Added to enable JavaMailSender bean in tests
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:dummy}
spring.mail.password=${MAIL_PASSWORD:dummy}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.from=noreply@jbnu-sugang-test.com
spring.mail.from-name=SugangHelper (Test)

# Subscription
app.subscription.max-limit=${SUBSCRIPTION_MAX_LIMIT:3}

# JBNU API
jbnu.api.url=${JBNU_API_URL:}

# Firebase for Test
app.firebase.config-path=./secrets/firebase-key.json
