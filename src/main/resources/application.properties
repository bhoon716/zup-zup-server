spring.application.name=sugang-helper

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# JWT
jwt.secret=${JWT_SECRET}
jwt.access.expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# OAuth2 Redirect
app.oauth2.authorized-redirect-uri=${OAUTH2_REDIRECT_URI_SUCCESS}

# Email (SMTP)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST}
spring.mail.from=${MAIL_FROM}
spring.mail.from-name=${MAIL_FROM_NAME}

# Subscription
app.subscription.max-limit=${SUBSCRIPTION_MAX_LIMIT}

# Firebase
app.firebase.config-path=${FIREBASE_CONFIG_PATH}

# Web Push
app.webpush.public-key=${WEBPUSH_PUBLIC_KEY}
app.webpush.private-key=${WEBPUSH_PRIVATE_KEY}
app.webpush.subject=${WEBPUSH_SUBJECT}

# JBNU API
jbnu.api.url=${JBNU_API_URL}
