spring.application.name=sugang-helper

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# JWT
jwt.secret=${JWT_SECRET:testJwtSecretKey1234567890123456789012345678901234567890}
jwt.access.expiration=1800000
jwt.refresh.expiration=1209600000

# CORS
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# OAuth2 Redirect (Custom)
app.oauth2.authorized-redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}

# Email (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:dummy}
spring.mail.password=${MAIL_PASSWORD:dummy}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.from=${MAIL_FROM:noreply@jbnu-sugang.com}
spring.mail.from-name=${MAIL_FROM_NAME:SugangHelper}

# Subscription
app.subscription.max-limit=${SUBSCRIPTION_MAX_LIMIT:3}

# Firebase
app.firebase.config-path=${FIREBASE_CONFIG_PATH:src/main/resources/firebase/firebase-key.json}

# Web Push
app.webpush.public-key=${WEBPUSH_PUBLIC_KEY}
app.webpush.private-key=${WEBPUSH_PRIVATE_KEY}
app.webpush.subject=${WEBPUSH_SUBJECT:mailto:admin@example.com}
