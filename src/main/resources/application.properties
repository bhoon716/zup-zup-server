spring.application.name=sugang-helper

# Database
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# JWT
jwt.secret=${JWT_SECRET:testJwtSecretKey1234567890123456789012345678901234567890}
jwt.access.expiration=${JWT_ACCESS_EXPIRATION:1800000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:1209600000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# OAuth2 Redirect
app.oauth2.authorized-redirect-uri=${OAUTH2_REDIRECT_URI_SUCCESS:http://localhost:3000/oauth2/redirect}

# Email (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:dummy@example.com}
spring.mail.password=${MAIL_PASSWORD:dummy-password}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.from=${MAIL_FROM:noreply@jbnu-sugang.com}
spring.mail.from-name=${MAIL_FROM_NAME:SugangHelper}

# Subscription
app.subscription.max-limit=${SUBSCRIPTION_MAX_LIMIT:3}

# Firebase
app.firebase.config-path=${FIREBASE_CONFIG_PATH:}

# Web Push
app.webpush.public-key=${WEBPUSH_PUBLIC_KEY:}
app.webpush.private-key=${WEBPUSH_PRIVATE_KEY:}
app.webpush.subject=${WEBPUSH_SUBJECT:mailto:admin@example.com}
