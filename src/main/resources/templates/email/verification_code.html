<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 인증</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #ffffff; color: #161118;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 480px; margin: 80px auto; padding: 0;">
        <tr>
            <td style="padding: 0 20px;">
                <!-- Logo/Brand -->
                <div style="margin-bottom: 48px; text-align: left;">
                    <span style="font-size: 20px; font-weight: 900; color: #572970; letter-spacing: -0.5px;">Zup-Zup</span>
                </div>
                
                <!-- Main Message -->
                <h2 style="margin: 0 0 16px 0; font-size: 24px; font-weight: 700; color: #161118; letter-spacing: -0.5px;">이메일 인증 코드입니다.</h2>
                <p style="margin: 0 0 40px 0; font-size: 15px; color: #4b5563; line-height: 1.6;">
                    안녕하세요! 회원가입 및 본인 확인을 위해<br>아래의 6자리 인증 코드를 입력해주세요.
                </p>
                
                <!-- Code Display -->
                <div style="background-color: #f7f6f8; border-radius: 12px; padding: 32px; text-align: center; margin-bottom: 48px;">
                    <span style="font-size: 36px; font-weight: 800; color: #572970; letter-spacing: 10px; margin-left: 10px;">{{code}}</span>
                </div>
                
                <!-- Footer Info -->
                <div style="border-top: 1px solid #e5e7eb; padding-top: 32px;">
                    <p style="margin: 0; color: #9ca3af; font-size: 13px; line-height: 1.5;">
                        © 2026 Zup-Zup. All rights reserved.<br>
                        전북대학교 수강신청 도우미 서비스
                    </p>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
