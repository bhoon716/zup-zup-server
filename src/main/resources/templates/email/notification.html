<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여석 알림</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #ffffff; color: #161118;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 480px; margin: 80px auto; padding: 0;">
        <tr>
            <td style="padding: 0 20px;">
                <!-- Logo/Brand -->
                <div style="margin-bottom: 48px; text-align: left;">
                    <span style="font-size: 20px; font-weight: 900; color: #572970; letter-spacing: -0.5px;">Zup-Zup</span>
                </div>
                
                <!-- Main Message -->
                <h2 style="margin: 0 0 16px 0; font-size: 24px; font-weight: 700; color: #161118; letter-spacing: -0.5px;">새로운 여석이 발생했습니다!</h2>
                
                <!-- Content Box -->
                <div style="margin: 32px 0 48px 0; padding: 24px; border-left: 4px solid #572970; background-color: #f7f6f8; border-radius: 0 8px 8px 0;">
                    <div style="font-size: 16px; color: #161118; line-height: 1.8; white-space: pre-wrap;">{{message}}</div>
                </div>
                
                <!-- Action Button -->
                <div style="margin-bottom: 64px; text-align: left;">
                    <a href="https://oasis.jbnu.ac.kr/jbnu/sugang/" style="display: inline-block; background-color: #572970; color: #ffffff; padding: 16px 40px; border-radius: 8px; text-decoration: none; font-size: 15px; font-weight: 700;">수강신청 바로가기</a>
                </div>
                
                <!-- Footer Info -->
                <div style="border-top: 1px solid #e5e7eb; padding-top: 32px;">
                    <p style="margin: 0; color: #9ca3af; font-size: 13px; line-height: 1.5;">
                        © 2026 Zup-Zup. All rights reserved.<br>
                        본 메일은 수신 동의를 하신 분들께 발급되는 알림입니다.
                    </p>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
