name: Deploy Server

on:
  push:
    branches:
      - main
  workflow_dispatch: # 수동 실행 옵션

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e # 오류 발생 시 즉시 중단

            REPO_DIR=~/jbnu-sugang-helper/server
            cd $REPO_DIR

            # 1. 최신 코드 가져오기 및 동기화
            echo ">>> Fetching latest code from main branch..."
            git fetch origin main
            git reset --hard origin/main

            # 2. 설정 파일 및 보안 파일 복구 (Secrets 사용)
            # application-prod.yml
            echo ">>> Restoring application-prod.yml..."
            mkdir -p src/main/resources
            cat << 'EOF' > src/main/resources/application-prod.yml
            ${{ secrets.APPLICATION_PROD_YML }}
            EOF

            # firebase-key.json
            echo ">>> Restoring firebase-key.json..."
            mkdir -p src/main/resources/firebase
            cat << 'EOF' > src/main/resources/firebase/firebase-key.json
            ${{ secrets.FIREBASE_KEY_JSON }}
            EOF

            # .env
            echo ">>> Restoring .env file..."
            cat << 'EOF' > .env
            ${{ secrets.SERVER_ENV }}
            EOF

            # 3. 도커 컨테이너 빌드 및 실행
            echo ">>> Rebuilding and starting Docker container..."
            sudo docker compose up -d --build --remove-orphans app

            # 4. 미사용 이미지 정리 (용량 확보)
            echo ">>> Cleaning up unused Docker images..."
            sudo docker image prune -f

            # 5. 배포 후 상태 확인
            echo ">>> Deployment completed. Checking container status..."
            sudo docker ps | grep sugang-helper-app
            echo ">>> Current server time: $(date)"
