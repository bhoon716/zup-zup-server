name: Fast Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fast-deploy-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/jbnu-sugang-helper-server

jobs:
  build_push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set image tag
        id: tag
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build jar
        run: ./gradlew bootJar -x test --no-daemon --build-cache

      - name: Prepare app jar
        run: |
          JAR_PATH="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)"
          if [ -z "$JAR_PATH" ]; then
            echo "bootJar output not found"
            exit 1
          fi
          cp "$JAR_PATH" build/libs/app.jar

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker build
        run: |
          docker build \
            --build-arg JAR_FILE=build/libs/app.jar \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            .

      - name: Docker push
        run: |
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build_push
    steps:
      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SERVER_SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_SSH_USER }}
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          IMAGE_TAG: ${{ needs.build_push.outputs.image_tag }}
        run: |
          set -eu

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          ssh-keyscan -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"

          ssh -i "$HOME/.ssh/id_rsa" "$SSH_USER@$SSH_HOST" "IMAGE_TAG='$IMAGE_TAG' bash -se" <<'EOF'
          set -eu
          cd "$HOME/jbnu-sugang-helper/server"
          APP_IMAGE_TAG="$IMAGE_TAG" sudo docker compose pull app
          APP_IMAGE_TAG="$IMAGE_TAG" sudo docker compose up -d --no-deps app
          sudo docker compose ps app
          EOF
