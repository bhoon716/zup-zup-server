name: Server CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/jbnu-sugang-helper-server

jobs:
  # 1. 빌드 잡 (PR 생성 시 & Main 머지 시 실행)
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # PR일 때도 빌드 결과물을 푸시하여 롤백/검증 가능하게 함 (속도 향상의 핵심)
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2. 배포 잡 (빌드 성공 후 & 오직 Main 머지 시에만 실행)
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_SHA,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            set -e

            REPO_DIR=~/jbnu-sugang-helper/server
            cd $REPO_DIR

            # 0. 최신 설정 파일 반영을 위한 git pull (설정 정보만 업데이트)
            echo ">>> 최신 설정 파일 및 compose 파일 업데이트 중..."
            # 혹시 모르니 remote 설정을 main으로 유지
            git pull origin main

            # 이미 빌드된 이미지 태그 (SHA-7자리) 사용
            NEW_TAG="sha-${GITHUB_SHA:0:7}"
            echo ">>> 신규 이미지 배포 시작: $NEW_TAG"

            # 1. GHCR 로그인 (이미지 pull을 위해 필요)
            echo "$GITHUB_TOKEN" | sudo docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            if [ ! -f .env ]; then
                echo "오류: .env 파일을 찾을 수 없습니다."
                exit 1
            fi

            # 2. .env 업데이트 (APP_IMAGE_TAG)
            # - 태그 값이 정확히 박히도록 sed 명령어 보완
            sed -i "s/^APP_IMAGE_TAG=.*/APP_IMAGE_TAG=$NEW_TAG/" .env

            # 3. 이미지 pull 및 컨테이너 재시작
            echo ">>> 이미지 가져오기 및 컨테이너 재시작..."
            sudo docker compose pull app
            sudo docker compose up -d app

            # 4. 헬스체크 대기
            echo ">>> 애플리케이션 상태 확인 중..."
            TIMEOUT=120
            for i in $(seq 1 $TIMEOUT); do
                STATUS=$(sudo docker inspect --format='{{json .State.Health.Status}}' sugang-helper-app | tr -d '"')
                if [ "$STATUS" = "healthy" ]; then
                    echo ">>> 배포 성공: 서비스 정상 가동 중."
                    exit 0
                fi
                if [ "$STATUS" = "unhealthy" ]; then
                    echo ">>> 배포 실패: 애플리케이션 상태 비정상."
                    sudo docker logs --tail=50 sugang-helper-app
                    exit 1
                fi
                sleep 1
            done

            echo ">>> 배포 타임아웃 ($TIMEOUT초)"
            exit 1
