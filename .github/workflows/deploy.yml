name: Server CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to production after image build
        type: boolean
        required: true
        default: true

concurrency:
  group: server-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/jbnu-sugang-helper-server

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew clean test --no-daemon

  build_image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.image_tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server-docker
          cache-to: type=gha,mode=max,scope=server-docker

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build_image
    timeout-minutes: 20
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.deploy == 'true')
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build_image.outputs.image_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR="$HOME/jbnu-sugang-helper/server"

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "[ERROR] Deploy repo not found: $REPO_DIR"
              exit 1
            fi

            cd "$REPO_DIR"
            git fetch --prune origin main
            git checkout main
            git pull --ff-only origin main

            if [ ! -f .env ]; then
              echo "[ERROR] Missing .env file in $REPO_DIR"
              exit 1
            fi

            update_image_tag() {
              local next_tag="$1"
              awk -F= -v next_tag="$next_tag" '
                BEGIN { updated = 0 }
                /^APP_IMAGE_TAG=/ {
                  print "APP_IMAGE_TAG=" next_tag
                  updated = 1
                  next
                }
                { print }
                END {
                  if (updated == 0) {
                    print "APP_IMAGE_TAG=" next_tag
                  }
                }
              ' .env > .env.tmp
              mv .env.tmp .env
            }

            PREV_TAG="$(awk -F= '/^APP_IMAGE_TAG=/{print $2}' .env | tail -n 1)"
            PREV_TAG="${PREV_TAG:-latest}"

            update_image_tag "$IMAGE_TAG"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose pull app
            docker compose up -d --no-deps app

            APP_CONTAINER_ID="$(docker compose ps -q app)"
            if [ -z "$APP_CONTAINER_ID" ]; then
              echo "[ERROR] Failed to resolve app container id"
              exit 1
            fi

            MAX_RETRY=90
            for i in $(seq 1 "$MAX_RETRY"); do
              HEALTH_STATUS="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$APP_CONTAINER_ID")"

              if [ "$HEALTH_STATUS" = "healthy" ] || [ "$HEALTH_STATUS" = "running" ]; then
                echo "[OK] Deployment succeeded with tag $IMAGE_TAG"
                docker image prune -f >/dev/null 2>&1 || true
                exit 0
              fi

              if [ "$HEALTH_STATUS" = "unhealthy" ] || [ "$HEALTH_STATUS" = "exited" ] || [ "$HEALTH_STATUS" = "dead" ]; then
                echo "[ERROR] New container became $HEALTH_STATUS. Rolling back to $PREV_TAG"
                docker logs --tail=120 "$APP_CONTAINER_ID" || true
                update_image_tag "$PREV_TAG"
                docker compose up -d --no-deps app
                exit 1
              fi

              sleep 2
            done

            echo "[ERROR] Health check timed out. Rolling back to $PREV_TAG"
            docker logs --tail=120 "$APP_CONTAINER_ID" || true
            update_image_tag "$PREV_TAG"
            docker compose up -d --no-deps app
            exit 1
