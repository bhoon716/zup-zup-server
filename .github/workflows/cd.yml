name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: JAR 빌드
        run: ./gradlew clean build -x test --no-daemon

      - name: application-prod.yml 파일 생성
        env:
          APP_YML: ${{ secrets.APPLICATION_PROD_YML }}
        run: |
          mkdir -p src/main/resources
          echo "$APP_YML" > src/main/resources/application-prod.yml

      - name: 서버 파일 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/libs/app.jar,src/main/resources/application-prod.yml,Dockerfile,.dockerignore,docker-compose.yml"
          target: "~/jbnu-sugang-helper/server/"

      - name: 서버에서 이미지 빌드 및 재배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/jbnu-sugang-helper/server
            docker build -t sugang-helper-app:latest .
            docker compose down
            docker compose up -d
