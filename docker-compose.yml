services:
  app:
    build:
      context: .
      args:
        SERVER_PORT: ${APP_PORT_CONTAINER}
    image: ${APP_IMAGE_NAME}
    container_name: ${APP_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${APP_PORT_HOST}:${APP_PORT_CONTAINER}"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: sugang-helper-mysql
      REDIS_HOST: sugang-helper-redis
      SPRING_DATASOURCE_PASSWORD: ${DB_ROOT_PASSWORD}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_FLYWAY_IGNORE_MISSING_MIGRATIONS: "true"
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      FIREBASE_CONFIG_PATH: /app/resources/firebase/firebase-key.json
    volumes:
      - ./src/main/resources/firebase/firebase-key.json:/app/resources/firebase/firebase-key.json:ro
    networks:
      - sugang-helper-network-server

networks:
  sugang-helper-network-server:
    external: true
