name: sugang-helper-server

services:
  app:
    image: sugang-helper-app:latest
    container_name: sugang-helper-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Seoul
      FIREBASE_CONFIG_PATH: /app/config/firebase-key.json
    ports:
      - "8080:8080"
    volumes:
      - ~/jbnu-sugang-helper/server/src/main/resources/application-prod.yml:/app/config/application-prod.yml:ro
      - ~/jbnu-sugang-helper/server/src/main/resources/firebase/firebase-key.json:/app/config/firebase-key.json:ro
    extra_hosts:
      - "oasis.jbnu.ac.kr:114.70.191.85"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - sugang-helper-network-server

networks:
  sugang-helper-network-server:
    external: true
